name: Draft Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build - ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: mia-agent-linux-x86_64
            asset_extension: .tar.gz
          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: my-app-windows-x86_64
            asset_extension: .zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install Rust Nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly
          targets: ${{ matrix.target }}

      - name: Build Binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package Binary (*nix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir staging
          cp target/${{ matrix.target }}/release/mia staging/
          cp README.md LICENSE staging/
          cd staging
          tar -czf ../${{ matrix.artifact_name }}${{ matrix.asset_extension }} *
          cd ..

      - name: Package Binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          mkdir staging
          cp target/${{ matrix.target }}/release/my-app.exe staging/
          cp README.md LICENSE staging/
          cd staging
          7z a ../${{ matrix.artifact_name }}${{ matrix.asset_extension }} *
          cd ..

      - name: Create Draft Release & Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'draft-latest' }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || 'Manual Nightly Draft' }}
          files: ${{ matrix.artifact_name }}${{ matrix.asset_extension }}
